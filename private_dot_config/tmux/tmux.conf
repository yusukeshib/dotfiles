# ============================================================================
# General Settings
# ============================================================================

# Use vi-style key bindings in copy mode
set -g mode-keys vi
set -g @shell_mode vi
set -g status-keys vi

# Enable mouse support for scrolling and pane selection
set -g mouse on

# Allow programs to detect focus events
set -g focus-events on

# Tell applications inside tmux to use the tmux terminfo entry
set -g default-terminal "tmux-256color"

# Enable true color for common 256-color terminals and Ghostty
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",screen-256color:Tc"
set -ga terminal-overrides ",xterm-ghostty:Tc"

# Forward tmux copies to the terminal clipboard when possible (OSC 52)
set -s set-clipboard on

# Set scrollback buffer size to 30,000 lines
set -g history-limit 30000

# Start window numbering at 1 instead of 0 (easier to reach on keyboard)
set -g base-index 1

# Start pane numbering at 1 instead of 0
set -g pane-base-index 1

# Keep window numbers contiguous after closing a window
set -g renumber-windows on

# ============================================================================
# Colors & Status Bar
# ============================================================================

# Use the terminal background for a transparent-looking status bar
set -g status-style 'fg=white,bg=default'

# Keep inactive windows readable without competing with the active one
set -g window-status-style 'fg=colour250,bg=default'
set -g window-status-format '#[fg=colour250,bg=default] #I:#W#{?window_flags,#{window_flags},} #[default]'

# Give the active window a bright highlight with dark text
set -g window-status-current-style 'fg=colour16,bg=colour10,bold'
set -g window-status-current-format '#[fg=colour16,bg=colour10,bold] #I:#W#{?window_flags,#{window_flags},} #[default]'

# Show hostname on the right side of status bar with CPU usage
set -g status-right '#{prefix_highlight} #{cpu_percentage} #[fg=#999999]%a %Y-%m-%d %H:%M #(hostname)'
set -g status-right-length 80

# ============================================================================
# Activity Monitoring
# ============================================================================

# Monitor for activity in other windows
set -g monitor-activity on

# Don't show popup message when activity occurs (just highlight in status bar)
set -g visual-activity off

# Highlight windows with activity in yellow and bold
set -g window-status-activity-style 'fg=colour3,bg=default,bold'

# Monitor for bells in other windows
set -g monitor-bell on

# Don't show visual flash when bell occurs
set -g visual-bell off

# Highlight windows with bells in red and bold
set -g window-status-bell-style 'fg=colour1,bg=default,bold'

# ============================================================================
# macOS Integration
# ============================================================================

# Vi-style visual selection in copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Copy selections into the macOS clipboard when pbcopy exists
if-shell 'command -v pbcopy >/dev/null 2>&1' \
  "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'; bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'pbcopy'; bind-key Y run-shell 'tmux save-buffer - | pbcopy'" \
  "bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel; bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel; bind-key Y copy-buffer"

# Paste from tmux buffer with prefix + p
bind-key p paste-buffer

# ============================================================================
# Key Bindings
# ============================================================================

# Change prefix from C-b to C-z (easier to reach)
set -g prefix C-z

# Reduce escape time for faster key response (10ms recommended for vim users)
set -s escape-time 10

# Reload config file with prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Reloaded config !!"

# Unbind default keys that we're replacing
unbind-key C-b
unbind-key %
unbind-key '"'

# Allow C-z C-z to send C-z to the terminal
bind-key C-z send-prefix

# Keep zoom toggle on an easy key even with the custom prefix
bind-key z resize-pane -Z

# Split panes intuitively: | for vertical split, - for horizontal split
bind-key - split-window -v
bind-key | split-window -h

# Resize panes with vim-style keys (repeatable with -r flag)
bind-key -r H resize-pane -L 2
bind-key -r J resize-pane -D 2
bind-key -r K resize-pane -U 2
bind-key -r L resize-pane -R 2

# Display pane numbers with prefix + i
bind-key i display-panes

# Kill pane with confirmation (prefix + k)
bind-key k confirm-before 'kill-pane'

# ============================================================================
# Plugins (TPM)
# ============================================================================

# TPM plugin manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Clipboard integration
set -g @plugin 'tmux-plugins/tmux-yank'

# Show prefix key press status
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# CPU and RAM monitoring
set -g @plugin 'tmux-plugins/tmux-cpu'

# ============================================================================
# Plugin Settings
# ============================================================================

# CPU plugin color settings
set -g @cpu_low_fg_color 'colour2'        # Green for low usage (< 30%)
set -g @cpu_medium_fg_color 'colour3'    # Yellow for medium usage (30-80%)
set -g @cpu_high_fg_color 'colour1'      # Red for high usage (> 80%)
set -g @cpu_low_thresh '30'
set -g @cpu_medium_thresh '50'
set -g @cpu_high_thresh '80'

# Auto-install TPM if not present
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
